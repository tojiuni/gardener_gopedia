# .woodpecker/ci.yml
# gardener-gopedia-svc 이미지 빌드 & push (Dagger) + K8s 배포
#
# Woodpecker Secrets 필요:
#   REGISTRY_TOKEN   — artifacts.toji.homes woodpecker-ci 유저 API 토큰
#   KUBECONFIG_DATA  — base64 인코딩된 kubeconfig

labels:
  platform: linux/amd64

when:
  - event: push
    branch: main
  - event: pull_request
  - event: tag
  - event: manual

steps:
  # ── PR: 빌드 검증만 (push 없음) ─────────────────────────────────────────
  # path filter: 코드/설정 변경이 있는 PR에서만 Docker build 검증 실행
  # doc/**·dataset/**·*.md 만 바뀐 PR은 건너뜀
  - name: validate-pr
    image: python:3.12-slim
    environment:
      DAGGER_RUNNER_HOST: tcp://dagger-engine.dagger.svc.cluster.local:1234
    commands:
      - pip install -q dagger-io anyio
      - python ci/run.py validate
    when:
      - event: pull_request
        path:
          include:
            - "gardener_gopedia/**"
            - "Dockerfile"
            - "pyproject.toml"
            - "alembic/**"
            - "ci/**"
          exclude:
            - "doc/**"
            - "dataset/**"
            - "*.md"

  # ── main push / manual / tag: 빌드 + registry push ─────────────────────
  - name: build-push
    image: python:3.12-slim
    environment:
      REGISTRY_TOKEN:
        from_secret: REGISTRY_TOKEN
      DAGGER_RUNNER_HOST: tcp://dagger-engine.dagger.svc.cluster.local:1234
    commands:
      - echo "DAGGER_RUNNER_HOST=${DAGGER_RUNNER_HOST}"
      - pip install -q dagger-io anyio
      - |
        EXTRA=""
        if [ -n "${CI_COMMIT_TAG}" ]; then
          EXTRA="--version-tag=${CI_COMMIT_TAG}"
        fi
        python ci/run.py build --sha=${CI_COMMIT_SHA} $EXTRA
    when:
      - event: push
        branch: main
      - event: tag
      - event: manual

  # ── main push / manual / tag: K8s 배포 ──────────────────────────────────
  - name: deploy
    image: bitnami/kubectl:latest
    environment:
      KUBECONFIG_DATA:
        from_secret: KUBECONFIG_DATA
    commands:
      - mkdir -p /tmp/.kube
      - printenv KUBECONFIG_DATA | base64 -d > /tmp/.kube/config
      - chmod 600 /tmp/.kube/config
      - export KUBECONFIG=/tmp/.kube/config
      - |
        TAG=$(echo "$CI_COMMIT_SHA" | cut -c1-7)
        kubectl set image deployment/gardener-gopedia-svc \
          gardener-gopedia-svc=artifacts.toji.homes/neunexus/gardener-gopedia-svc:$TAG \
          -n gardener-gopedia
        kubectl rollout status deployment/gardener-gopedia-svc -n gardener-gopedia --timeout=300s
    when:
      - event: push
        branch: main
      - event: manual
      - event: tag
