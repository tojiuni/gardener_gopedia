# .woodpecker/ci.yml
# gardener-gopedia-svc 이미지 빌드 & push (Dagger)
#
# Woodpecker Secrets 필요:
#   REGISTRY_TOKEN   — artifacts.toji.homes woodpecker-ci 유저 API 토큰

# shallow clone: 히스토리 1개만 (dataset/ JSON 파일 클론 시간 단축)
# image 미지정 — Woodpecker 기본 clone 이미지 사용 (커스텀 이미지는 allow list 필요)
clone:
  git:
    settings:
      depth: 1

when:
  - event: push
    branch: main
  - event: pull_request
  - event: tag
  - event: manual

steps:
  # ── PR: 빌드 검증만 (push 없음) ─────────────────────────────────────────
  # path filter: 코드/설정 변경이 있는 PR에서만 Docker build 검증 실행
  # doc/**·dataset/**·*.md 만 바뀐 PR은 건너뜀
  - name: validate-pr
    image: python:3.12-slim
    environment:
      DAGGER_RUNNER_HOST: tcp://dagger-engine.dagger.svc.cluster.local:1234
    commands:
      - pip install -q dagger-io anyio
      - python ci/run.py validate
    when:
      - event: pull_request
        path:
          include:
            - "gardener_gopedia/**"
            - "Dockerfile"
            - "pyproject.toml"
            - "alembic/**"
            - "ci/**"
          exclude:
            - "doc/**"
            - "dataset/**"
            - "*.md"

  # ── main push / manual / tag: 빌드 + registry push ─────────────────────
  - name: build-push
    image: python:3.12-slim
    environment:
      REGISTRY_TOKEN:
        from_secret: REGISTRY_TOKEN
      DAGGER_RUNNER_HOST: tcp://dagger-engine.dagger.svc.cluster.local:1234
    commands:
      - echo "DAGGER_RUNNER_HOST=${DAGGER_RUNNER_HOST}"
      - pip install -q dagger-io anyio
      - |
        EXTRA=""
        if [ -n "${CI_COMMIT_TAG}" ]; then
          EXTRA="--version-tag=${CI_COMMIT_TAG}"
        fi
        python ci/run.py build --sha=${CI_COMMIT_SHA} $EXTRA
    when:
      - event: push
        branch: main
      - event: tag
      - event: manual
