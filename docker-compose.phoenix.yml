# Self-hosted Arize Phoenix for Gardener eval visualization (OTLP + UI).
# Docs: https://github.com/Arize-ai/phoenix
#
# Usage:
#   docker compose -f docker-compose.phoenix.yml up -d
#   UI: http://127.0.0.1:6006
#   OTLP HTTP (traces): http://127.0.0.1:6006/v1/traces
#
# Gardener env:
#   GARDENER_PHOENIX_OTLP_ENDPOINT=http://127.0.0.1:6006/v1/traces

services:
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
    environment:
      PHOENIX_TELEMETRY_ENABLED: "false"
    # Phoenix persists to local volume by default in recent images; adjust if needed.
